<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumiTeach Help Center</title>
  <link rel="icon" href="lumiteach_assets/brand/lumiteach-favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="global-header">
    <div class="logo" onclick="showHome()">LumiTeach 서비스 가이드</div>
    <div class="header-actions">
      <label class="visually-hidden" for="languageSelect">언어 선택</label>
      <span class="language-wrap">
        <select class="language-select" id="languageSelect" aria-label="언어 선택">
          <option value="ko">한국어</option>
          <option value="en">영어</option>
          <option value="pt">포르투갈어</option>
          <option value="es">스페인어</option>
          <option value="ja">일본어</option>
          <option value="vi">베트남어</option>
        </select>
      </span>
      <button class="menu-toggle" id="mobileMenuToggle" type="button" aria-label="메뉴 열기" aria-controls="leftTree" aria-expanded="false" onclick="toggleMobileMenu()">
        <span></span>
      </button>
    </div>
  </header>
  <div class="mobile-nav-backdrop" id="mobileNavBackdrop" onclick="closeMobileMenu()" aria-hidden="true"></div>

  <section class="view active" id="homeView">
    <div class="home-hero">
      <h1>무엇을 도와드릴까요?</h1>
      <p>LumiTeach를 시작하고 수업을 운영하는 데 필요한 모든 가이드를 확인해보세요.</p>
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4 4"></path>
          </svg>
        </span>
        <input class="search-input" id="searchInput" placeholder="아티클 제목, 기능명, 오류 상황을 검색해보세요" />
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <main class="home-container">
      <section class="home-section">
        <h2 class="section-title">전체 카테고리</h2>
        <div class="category-grid" id="categoryGrid"></div>
      </section>
    </main>
  </section>

  <section class="view" id="articleView">
    <div class="article-shell">
      <aside class="left-nav">
        <div class="left-tree" id="leftTree"></div>
      </aside>
      <main class="article-main">
        <div class="article-inner">
          <article id="articleContent"></article>
        </div>
        <aside class="right-toc" id="rightToc"></aside>
      </main>
    </div>
  </section>

  <script src="data/manual-data.js"></script>
  <script src="data/translations.js"></script>
  <script src="app.js"></script>
</body>
</html>
